    // --- EDITABLE TEXT COMPONENT ---
    const ContentEditable = ({ html, tagName, className, onChange, isEditMode, placeholder }) => {
      const contentEditableRef = useRef(null);

      useEffect(() => {
        if (contentEditableRef.current && html !== contentEditableRef.current.innerHTML) {
          contentEditableRef.current.innerHTML = html;
        }
      }, [html]);

      const handleBlur = (e) => {
        onChange(e.target.innerHTML);
      };

      return React.createElement(tagName || 'div', {
        ref: contentEditableRef,
        className: `${className} outline-none transition-all duration-200 ${
          isEditMode ? 'hover:bg-[#fafafa]/5 focus:bg-[#fafafa]/10 ring-1 ring-transparent focus:ring-[#f15e27]/50 rounded-md px-2 py-1 -ml-2' : ''
        }`,
        contentEditable: isEditMode,
        onBlur: handleBlur,
        dangerouslySetInnerHTML: { __html: html },
        placeholder: isEditMode ? placeholder : '',
        style: { minHeight: isEditMode ? '1.5em' : 'auto' }
      });
    };

      };

      // --- JSON EXPORT / IMPORT ---
      const handleExportJson = () => {
        const dataToExport = {
          campaigns,
          stories,
          launchDate
        };
        const jsonString = JSON.stringify(dataToExport, null, 2);
        const blob = new Blob([jsonString], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `nomaro-campaign-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("Schedule exported successfully!");
      };

      const handleImportJson = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsedData = JSON.parse(e.target.result);
            if (parsedData.campaigns) setCampaigns(parsedData.campaigns);
            if (parsedData.stories) setStories(parsedData.stories);
            if (parsedData.launchDate !== undefined) setLaunchDate(parsedData.launchDate);
            showToast("Schedule imported successfully!");
          } catch (error) {
            showToast("Error: Invalid JSON file format.");
          }
        };
        reader.readAsText(file);
        event.target.value = null; // reset input
      };

      // --- PIN LOGIC ---
      const handleEditToggle = () => {
        if (isEditMode) {
          setIsEditMode(false);
        } else {
          setShowPinModal(true);
          setPinInput('');
          setPinError(false);
        }
      };

      const handlePinSubmit = (e) => {

          setIsEditMode(true);
          setShowPinModal(false);

        } else {
          setPinError(true);
        }
      };

      // --- DATE CALCULATOR ---
      const calculateDate = (dayString, baseDateStr) => {
        if (!baseDateStr) return dayString;
        
        const processSingleDay = (dStr) => {
          const num = parseInt(dStr.replace(/[^0-9-]/g, ''), 10);
          if (isNaN(num)) return dStr;
          
          const date = new Date(baseDateStr);
          date.setDate(date.getDate() + num);
          
          return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        };

        if (dayString.includes('to')) {
          const parts = dayString.split('to').map(p => p.trim());
          return `${processSingleDay(parts[0])} - ${processSingleDay(parts[1])}`;
        }
        
        return processSingleDay(dayString);

      const handleDragStart = (e, phaseIdx, eventIdx) => {
        setDragInfo({ phaseIdx, eventIdx });

        e.target.style.opacity = '1';
        setDragInfo(null);
      };

      const handleDragOver = (e, targetPhaseIdx, targetEventIdx) => {
        e.preventDefault();
        if (!dragInfo) return;
        if (dragInfo.phaseIdx === targetPhaseIdx && dragInfo.eventIdx === targetEventIdx) return;

        const newData = [...campaigns];
        const sourceEvent = newData[dragInfo.phaseIdx].events[dragInfo.eventIdx];
        
        newData[dragInfo.phaseIdx].events.splice(dragInfo.eventIdx, 1);
        newData[targetPhaseIdx].events.splice(targetEventIdx, 0, sourceEvent);

        setDragInfo({ phaseIdx: targetPhaseIdx, eventIdx: targetEventIdx });
      };

                  onChange={(e) => setLaunchDate(e.target.value)}
                  className="bg-transparent text-xs sm:text-sm font-mono outline-none text-[#fafafa] cursor-pointer"
                  style={{ colorScheme: 'dark' }}
                />
              </div>
              
              {/* Edit Mode Toggle */}
              <button 
                onClick={handleEditToggle}
                className={`flex items-center gap-2 px-4 py-2 rounded-md font-bold text-sm transition-all whitespace-nowrap border ${
                  isEditMode 
                    ? 'bg-[#f15e27] text-white border-[#f15e27] shadow-[0_0_15px_rgba(241,94,39,0.4)]' 
                    : 'bg-[#5e5e63]/20 text-[#fafafa] border-[#5e5e63]/30 hover:bg-[#5e5e63]/40'
                }`}
              >
                <Icon name={isEditMode ? "Eye" : "Edit3"} className="w-4 h-4" />
                {isEditMode ? 'Preview Mode' : 'Edit Schedule'}
              </button>
            </div>
          </header>

          {/* FORMATTING TOOLBAR (Visible only in Edit Mode) */}
          {isEditMode && (
            <div className="fixed bottom-6 md:top-24 md:bottom-auto left-1/2 transform -translate-x-1/2 bg-[#1a1a1c] border border-[#5e5e63]/50 rounded-full px-4 py-2 flex items-center gap-2 sm:gap-4 z-40 shadow-2xl backdrop-blur-md">
              <span className="text-xs font-mono text-[#5e5e63] mr-2 hidden sm:block">FORMAT TEXT</span>
              <button onMouseDown={e => { e.preventDefault(); document.execCommand('bold'); }} className="text-[#fafafa]/70 hover:text-[#f15e27] transition-colors p-1" title="Bold">
                 <Icon name="Bold" className="w-4 h-4" />
              </button>
              <button onMouseDown={e => { e.preventDefault(); document.execCommand('italic'); }} className="text-[#fafafa]/70 hover:text-[#f15e27] transition-colors p-1" title="Italic">
                 <Icon name="Italic" className="w-4 h-4" />
              </button>
              <button onMouseDown={e => { e.preventDefault(); document.execCommand('underline'); }} className="text-[#fafafa]/70 hover:text-[#f15e27] transition-colors p-1" title="Underline">
                 <Icon name="Underline" className="w-4 h-4" />
              </button>
              <div className="w-px h-4 bg-[#5e5e63]/50 mx-1"></div>
              <button onMouseDown={e => { e.preventDefault(); document.execCommand('insertUnorderedList'); }} className="text-[#fafafa]/70 hover:text-[#f15e27] transition-colors p-1" title="Bullet List">
                 <Icon name="List" className="w-4 h-4" />
              </button>
              <button onMouseDown={e => { e.preventDefault(); document.execCommand('insertOrderedList'); }} className="text-[#fafafa]/70 hover:text-[#f15e27] transition-colors p-1" title="Numbered List">
                 <Icon name="ListOrdered" className="w-4 h-4" />
              </button>
            </div>
          )}

          {/* MAIN CONTENT */}
          <main className="flex-1 flex flex-col lg:flex-row max-w-screen-2xl mx-auto w-full relative">
            
            {/* SIDEBAR NAVIGATION */}
            <aside className="lg:w-72 border-b lg:border-b-0 lg:border-r border-[#5e5e63]/30 p-4 lg:p-6 flex lg:flex-col overflow-x-auto lg:overflow-y-auto lg:sticky lg:top-[73px] lg:h-[calc(100vh-73px)] shrink-0 hide-scrollbar gap-2">
              
              <h2 className="text-[10px] font-mono text-[#5e5e63] uppercase tracking-[0.2em] mb-2 hidden lg:block shrink-0">Strategic Timeline</h2>
              {campaigns.map((phase, idx) => (
                <button
                  key={idx}
                  onClick={() => {
                    setActivePhase(idx);
                    document.getElementById(`phase-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  }}
                  className={`flex flex-col text-left px-4 py-3 rounded-lg transition-all whitespace-nowrap lg:whitespace-normal duration-300 border shrink-0 lg:shrink ${
                    activePhase === idx 
                      ? 'bg-[#f15e27]/10 border-[#f15e27] text-[#f15e27]' 
                      : 'border-transparent text-[#fafafa]/60 hover:bg-[#5e5e63]/10 hover:text-[#fafafa]'
                  }`}
                >
                  <span className="font-mono text-xs opacity-80 mb-1">PHASE {phase.phase}</span>
                  <span className="font-bold text-sm tracking-wide truncate lg:whitespace-normal">{phase.title}</span>
                </button>
              ))}

              {/* IDEATION NAVIGATION LINK */}
              <h2 className="text-[10px] font-mono text-[#5e5e63] uppercase tracking-[0.2em] mb-2 hidden lg:block shrink-0 mt-6 pt-6 border-t border-[#5e5e63]/30">Ideation</h2>
              <button
                onClick={() => {
                  setActivePhase('stories');
                  document.getElementById('section-stories')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }}
                className={`flex items-center gap-3 text-left px-4 py-3 rounded-lg transition-all whitespace-nowrap lg:whitespace-normal duration-300 border shrink-0 lg:shrink ${
                  activePhase === 'stories'
                    ? 'bg-[#f4c430]/10 border-[#f4c430] text-[#f4c430]' 
                    : 'border-transparent text-[#fafafa]/60 hover:bg-[#5e5e63]/10 hover:text-[#fafafa]'
                }`}
              >
                <Icon name="Lightbulb" className={`w-4 h-4 ${activePhase === 'stories' ? 'text-[#f4c430]' : 'text-[#fafafa]/50'}`} />
                <span className="font-bold text-sm tracking-wide truncate lg:whitespace-normal">Story Board</span>
              </button>

            </aside>

            {/* TIMELINE FEED */}
            <div className="flex-1 p-4 sm:p-6 lg:p-12 overflow-y-auto pb-32">
              <div className="max-w-4xl mx-auto space-y-24">
                
                {/* RENDER ALL CAMPAIGN PHASES */}
                {campaigns.map((phase, phaseIdx) => (
                  <section 
                    key={phaseIdx} 
                    id={`phase-${phaseIdx}`} 
                    className="scroll-mt-24 lg:scroll-mt-32"
                    onMouseEnter={() => setActivePhase(phaseIdx)}
                  >
                    {/* Phase Header */}
                    <div className="mb-10">
                      <div className="flex items-center gap-3 mb-4">
                        <div className="h-px flex-1 bg-gradient-to-r from-[#f15e27] to-transparent max-w-[50px]"></div>
                        <span className="font-mono text-sm text-[#f15e27] tracking-widest">PHASE {phase.phase}</span>
                      </div>
                      <h2 className="text-3xl md:text-5xl font-bold tracking-tight mb-4">{phase.title}</h2>
                      
                      <div className="flex flex-col md:flex-row md:items-center gap-4 text-sm font-mono border-b border-[#5e5e63]/30 pb-6 mb-6">
                        <div className="flex items-center gap-2 bg-[#5e5e63]/20 text-[#fafafa] px-3 py-1.5 rounded-full w-max">
                          <Icon name="Calendar" className="w-4 h-4 text-[#f15e27]" />
                          <span>{launchDate ? calculateDate(phase.timeframe.replace(/Day /g, ''), launchDate) : phase.timeframe}</span>
                        </div>
                      </div>

                      <p className="text-base md:text-lg text-[#fafafa]/70 font-serif leading-relaxed italic max-w-3xl">
                        "{phase.objective}"
                      </p>

                      {/* Phase Budgets */}
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 md:gap-4 mt-8 mb-4">
                        {/* Media Production */}
                        <div className="bg-[#5e5e63]/10 border border-[#5e5e63]/20 hover:border-[#f15e27]/50 transition-colors rounded-xl p-4 flex flex-col gap-2">
                          <div className="flex items-center gap-2 text-[#fafafa]/60 text-xs font-mono uppercase tracking-wider">
                            <Icon name="Film" className="w-4 h-4 text-[#f15e27]" /> Media Prod.
                          </div>
                          {isEditMode ? (
                            <input 
                              type="text"
                              value={phase.budget?.mediaProduction || ""}
                              onChange={(e) => updatePhaseBudget(phaseIdx, 'mediaProduction', e.target.value)}
                              placeholder="e.g. ₹50,000"
                              className="bg-[#0f0f10] border border-[#5e5e63]/50 focus:border-[#f15e27] rounded text-base md:text-lg font-bold text-[#fafafa] px-3 py-1.5 outline-none w-full transition-colors"
                            />
                          ) : (
                            <div className="text-lg md:text-xl font-bold text-[#fafafa]">{phase.budget?.mediaProduction || "₹0"}</div>
                          )}
                        </div>

                        {/* Performance Marketing */}
                        <div className="bg-[#5e5e63]/10 border border-[#5e5e63]/20 hover:border-[#f15e27]/50 transition-colors rounded-xl p-4 flex flex-col gap-2">
                          <div className="flex items-center gap-2 text-[#fafafa]/60 text-xs font-mono uppercase tracking-wider">
                            <Icon name="Activity" className="w-4 h-4 text-[#f15e27]" /> Perf. Mktg
                          </div>
                          {isEditMode ? (
                            <input 
                              type="text"
                              value={phase.budget?.performanceMarketing || ""}
                              onChange={(e) => updatePhaseBudget(phaseIdx, 'performanceMarketing', e.target.value)}
                              placeholder="To be determined"
                              className="bg-[#0f0f10] border border-[#5e5e63]/50 focus:border-[#f15e27] rounded text-sm md:text-base font-bold text-[#fafafa] px-3 py-1.5 outline-none w-full transition-colors"
                            />
                          ) : (
                            <div className="text-base md:text-lg font-bold text-[#fafafa]">{phase.budget?.performanceMarketing || "TBD"}</div>
                          )}
                        </div>

                        {/* Agency Charges */}
                        <div className="bg-[#5e5e63]/10 border border-[#5e5e63]/20 hover:border-[#f15e27]/50 transition-colors rounded-xl p-4 flex flex-col gap-2">
                          <div className="flex items-center gap-2 text-[#fafafa]/60 text-xs font-mono uppercase tracking-wider">
                            <Icon name="Briefcase" className="w-4 h-4 text-[#f15e27]" /> Agency
                          </div>
                          {isEditMode ? (
                            <input 
                              type="text"
                              value={phase.budget?.agencyCharges || ""}
                              onChange={(e) => updatePhaseBudget(phaseIdx, 'agencyCharges', e.target.value)}
                              placeholder="e.g. ₹1,50,000"
                              className="bg-[#0f0f10] border border-[#5e5e63]/50 focus:border-[#f15e27] rounded text-base md:text-lg font-bold text-[#fafafa] px-3 py-1.5 outline-none w-full transition-colors"
                            />
                          ) : (
                            <div className="text-lg md:text-xl font-bold text-[#fafafa]">{phase.budget?.agencyCharges || "₹0"}</div>
                          )}
                        </div>
                      </div>
                    </div>

                    {/* Timeline Entries */}
                    <div className="relative border-l border-[#5e5e63]/30 ml-2 md:ml-4 space-y-6 md:space-y-8">
                      {phase.events.map((event, eventIdx) => {
                        let currentIconName = "FileText"; // default
                        if (event.icon === "Video") currentIconName = "Video";
                        if (event.icon === "Film") currentIconName = "Film";
                        if (event.icon === "Volume2") currentIconName = "Volume2";
                        if (event.icon === "ImageIcon" || event.icon === "Image") currentIconName = "Image";
                        if (event.icon === "Globe") currentIconName = "Globe";
                        if (event.icon === "Activity") currentIconName = "Activity";
                        if (event.icon === "Clock") currentIconName = "Clock";
                        if (event.icon === "PlayCircle") currentIconName = "PlayCircle";
                        
                        return (
                          <div 
                            key={event.id}
                            draggable={isEditMode}
                            onDragStart={(e) => handleDragStart(e, phaseIdx, eventIdx)}
                            onDragEnd={handleDragEnd}
                            onDragOver={(e) => handleDragOver(e, phaseIdx, eventIdx)}
                            className={`relative pl-6 md:pl-12 group ${isEditMode ? 'cursor-grab active:cursor-grabbing' : ''}`}
                          >
                            {/* Timeline Node */}
                            <div className="absolute -left-2 top-3 w-4 h-4 rounded-full bg-[#0f0f10] border-2 border-[#5e5e63] group-hover:border-[#f15e27] transition-colors duration-300 flex items-center justify-center z-10">
                              <div className="w-1.5 h-1.5 rounded-full bg-[#f15e27] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            </div>

                            {/* Content Card */}
                            <div className={`bg-[#5e5e63]/10 hover:bg-[#5e5e63]/20 border ${isEditMode ? 'border-[#5e5e63]/50' : 'border-[#5e5e63]/20'} hover:border-[#f15e27]/50 transition-all duration-300 rounded-xl p-4 md:p-6 backdrop-blur-sm relative overflow-hidden`}>
                              
                              {/* Accent line on hover */}
                              <div className="absolute left-0 top-0 bottom-0 w-1 bg-[#f15e27] scale-y-0 group-hover:scale-y-100 transform origin-top transition-transform duration-300 hidden md:block"></div>

                              {/* Editable Tools Container */}
                              <div className="flex flex-col lg:flex-row lg:items-start justify-between gap-4">
                                
                                {/* Drag Handle & Content Area */}
                                <div className="flex-1 flex gap-2 md:gap-3">
                                  
                                  {/* Drag Handle visible only in edit mode */}
                                  {isEditMode && (
                                    <div className="mt-1 text-[#5e5e63] shrink-0 hidden sm:block">
                                      <Icon name="GripVertical" className="w-5 h-5" />
                                    </div>
                                  )}

                                  <div className="flex-1 min-w-0">
                                    {/* Meta Info (Day/Date & Type) */}
                                    <div className="flex items-center gap-2 md:gap-3 mb-3 flex-wrap">
                                      <div className="flex items-center bg-[#f4c430] rounded shadow-sm text-[#0f0f10] font-mono text-[10px] md:text-xs font-bold overflow-hidden">
                                        <span className="px-2 py-0.5 opacity-70 border-r border-black/10">
                                          {launchDate && !isEditMode ? 'DATE' : 'DAY'}
                                        </span>
                                        {isEditMode ? (
                                          <input 
                                            type="text"
                                            value={event.day}
                                            onChange={(e) => updateEvent(phaseIdx, eventIdx, 'day', e.target.value)}
                                            className="bg-transparent px-2 py-0.5 outline-none w-16 focus:bg-white/30"
                                          />
                                        ) : (
                                          <span className="px-2 py-0.5">
                                            {launchDate ? calculateDate(event.day, launchDate) : event.day}
                                          </span>
                                        )}
                                      </div>

                                      <div className="flex items-center gap-1.5 text-[10px] md:text-xs font-mono text-[#f15e27]">
                                        <Icon name={currentIconName} className="w-3.5 h-3.5 shrink-0 hidden sm:block" />
                                        {isEditMode ? (
                                          <input 
                                            type="text"
                                            value={event.type}
                                            onChange={(e) => updateEvent(phaseIdx, eventIdx, 'type', e.target.value)}
                                            className="bg-transparent border-b border-[#f15e27]/30 outline-none w-24 md:w-32 focus:border-[#f15e27] uppercase tracking-wider"
                                          />
                                        ) : (
                                          <span className="uppercase tracking-wider truncate">{event.type}</span>
                                        )}
                                      </div>
                                    </div>
                                    
                                    {/* Editable Title */}
                                    <ContentEditable 
                                      tagName="h3"
                                      className="text-lg md:text-xl font-bold mb-2 tracking-tight group-hover:text-[#f15e27]"
                                      html={event.name}
                                      onChange={(val) => updateEvent(phaseIdx, eventIdx, 'name', val)}
                                      isEditMode={isEditMode}
                                      placeholder="Campaign Title"
                                    />

                                    {/* Editable Description */}
                                    <ContentEditable 
                                      tagName="div"
                                      className="rich-text text-[#fafafa]/70 text-sm md:text-base leading-relaxed"
                                      html={event.desc}
                                      onChange={(val) => updateEvent(phaseIdx, eventIdx, 'desc', val)}
                                      isEditMode={isEditMode}
                                      placeholder="Enter detailed description here..."
                                    />
                                  </div>
                                </div>
                                
                                {/* Right Side UI (Icons & Delete) */}
                                <div className="flex flex-row lg:flex-col items-center lg:items-end justify-between lg:justify-start gap-3 shrink-0 mt-2 lg:mt-0 pt-3 lg:pt-0 border-t border-[#5e5e63]/20 lg:border-t-0">
                                  {/* Visual Indicator / Icon Selector */}
                                  {isEditMode ? (
                                    <div className="flex flex-row lg:flex-col items-center lg:items-end gap-2 w-full lg:w-auto">
                                      <select 
                                        value={event.icon}
                                        onChange={(e) => updateEvent(phaseIdx, eventIdx, 'icon', e.target.value)}
                                        className="bg-[#0f0f10] border border-[#5e5e63] text-[#fafafa] text-xs font-mono rounded px-2 py-1.5 outline-none focus:border-[#f15e27] flex-1 lg:flex-none"
                                      >
                                        <option value="Video">Video</option>
                                        <option value="Film">Film</option>
                                        <option value="FileText">FileText</option>
                                        <option value="Image">Image</option>
                                        <option value="Volume2">Volume2</option>
                                        <option value="Globe">Globe</option>
                                        <option value="Activity">Activity</option>
                                        <option value="Clock">Clock</option>
                                        <option value="PlayCircle">PlayCircle</option>
                                      </select>
                                      <button 
                                        onClick={() => deleteEvent(phaseIdx, eventIdx)}
                                        className="text-[#5e5e63] hover:text-red-500 transition-colors p-1.5 bg-[#0f0f10] rounded border border-[#5e5e63]/30"
                                        title="Delete Card"
                                      >
                                        <Icon name="Trash2" className="w-4 h-4" />
                                      </button>
                                    </div>
                                  ) : (
                                    <div className="flex w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#0f0f10] border border-[#5e5e63]/30 items-center justify-center text-[#fafafa]/30 group-hover:text-[#f15e27] transition-colors ml-auto lg:ml-0">
                                      <Icon name={currentIconName} className="w-4 h-4 md:w-5 md:h-5" />
                                    </div>
                                  )}
                                </div>

                              </div>
                            </div>
                          </div>
                        );
                      })}

                      {/* ADD NEW CARD BUTTON */}
                      {isEditMode && (
                        <div className="pl-6 md:pl-12 mt-4">
                          <button 
                            onClick={() => addEvent(phaseIdx)}
                            className="w-full py-4 border-2 border-dashed border-[#5e5e63]/40 hover:border-[#f15e27]/60 hover:bg-[#f15e27]/5 rounded-xl flex items-center justify-center gap-2 text-[#5e5e63] hover:text-[#f15e27] transition-all font-mono text-xs md:text-sm"
                          >
                            <Icon name="Plus" className="w-4 h-4" /> Add New Campaign Card
                          </button>
                        </div>
                      )}

                    </div>
                  </section>
                ))}

                {/* --- STORY IDEATION BOARD (MASONRY FIX) --- */}
                <section 
                  id="section-stories" 
                  className="scroll-mt-24 lg:scroll-mt-32 pt-16 mt-16 border-t border-[#5e5e63]/30"
                  onMouseEnter={() => setActivePhase('stories')}
                >
                  {/* Header */}
                  <div className="mb-10">
                    <div className="flex items-center gap-3 mb-4">
                      <div className="h-px flex-1 bg-gradient-to-r from-[#f4c430] to-transparent max-w-[50px]"></div>
                      <span className="font-mono text-sm text-[#f4c430] tracking-widest">IDEATION</span>
                    </div>
                    <h2 className="text-3xl md:text-5xl font-bold tracking-tight mb-4">Story Board</h2>
                    <p className="text-base md:text-lg text-[#fafafa]/70 font-serif leading-relaxed italic max-w-3xl">
                      "Raw narratives, emotional hooks, and concepts waiting to be turned into active campaigns."
                    </p>
                  </div>

                  {/* Story Grid - Masonry CSS using Columns */}
                  <div className="columns-1 md:columns-2 gap-6 md:gap-8 w-full">
                    {stories.map(story => (
                      <div key={story.id} className={`break-inside-avoid mb-6 md:mb-8 bg-[#1a1a1c] border ${isEditMode ? 'border-[#5e5e63]/50' : 'border-[#5e5e63]/20'} hover:border-[#f4c430]/50 transition-colors p-6 md:p-8 rounded-xl relative group flex flex-col gap-4 shadow-lg`}>
                        
                        {/* Visual Tab */}
                        <div className="absolute top-0 left-0 w-full h-1 bg-[#f4c430] opacity-50 rounded-t-xl"></div>

                        <ContentEditable 
                          tagName="h3"
                          className="text-xl md:text-2xl font-bold tracking-tight text-[#fafafa] group-hover:text-[#f4c430] transition-colors pr-8"
                          html={story.title}
                          onChange={(val) => updateStory(story.id, 'title', val)}
                          isEditMode={isEditMode}
                          placeholder="Story Concept Title"
                        />
                        
                        {/* Rich Text Editor Container - Implemented Internal Scrollbar & Masonry Break Avoidance */}
                        <ContentEditable 
                          tagName="div"
                          className="rich-text text-[#fafafa]/70 text-sm md:text-base flex-1 max-h-[400px] overflow-y-auto custom-scrollbar pr-2"
                          html={story.content}
                          onChange={(val) => updateStory(story.id, 'content', val)}
                          isEditMode={isEditMode}
                          placeholder="Describe the narrative arc, visual style, or emotional hook here..."
                        />

                        {isEditMode && (
                          <button 
                            onClick={() => deleteStory(story.id)}
                            className="absolute top-6 right-6 text-[#5e5e63] hover:text-red-500 transition-colors p-1.5 bg-[#0f0f10] rounded border border-[#5e5e63]/30"
                            title="Delete Story Concept"
                          >
                            <Icon name="Trash2" className="w-5 h-5" />
                          </button>
                        )}
                      </div>
                    ))}
                    
                    {/* Add Story Button - Avoid Break Inside Masonry */}
                    {isEditMode && (
                      <button 
                        onClick={addStory}
                        className="break-inside-avoid min-h-[150px] w-full border-2 border-dashed border-[#5e5e63]/40 hover:border-[#f4c430]/60 hover:bg-[#f4c430]/5 rounded-xl flex flex-col items-center justify-center gap-3 text-[#5e5e63] hover:text-[#f4c430] transition-all font-mono text-sm group mb-8"
                      >
                        <div className="w-10 h-10 rounded-full bg-[#0f0f10] border border-[#5e5e63]/40 flex items-center justify-center group-hover:border-[#f4c430]/60 transition-colors">
                          <Icon name="Plus" className="w-5 h-5" />
                        </div>
                        Add New Story Concept
                      </button>
                    )}
                  </div>
                </section>

              </div>
              
              {/* FOOTER */}
              <div className="mt-24 pt-12 border-t border-[#5e5e63]/30 flex flex-col items-center justify-center text-center opacity-50 pb-8">
                <p className="font-mono text-xs tracking-widest uppercase">End of Initial Launch Window</p>
                <p className="font-serif italic text-sm mt-2 mb-8">The journey continues.</p>
                
                <div className="font-bold tracking-widest text-[#f15e27] uppercase text-sm border-2 border-[#f15e27]/30 px-6 py-3 rounded-lg flex items-center gap-3">
                  <Icon name="Film" className="w-4 h-4" />
                  MADE BY KOOTHU
                </div>
              </div>

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
